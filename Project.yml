name: Lathe
options:
  bundleIdPrefix: com.hongmono
  deploymentTarget:
    macOS: "14.6"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Lathe Local Dev"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.2
targets:
  Lathe:
    type: application
    platform: macOS
    sources:
      - path: Lathe
        excludes:
          - "Resources/Info.plist"
    resources:
      - Lathe/Resources/Assets.xcassets
      - Lathe/Resources/en.lproj
      - Lathe/Resources/ko.lproj
    info:
      path: Lathe/Resources/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.6"
        CFBundleName: Lathe
        CFBundleDisplayName: Lathe
        CFBundleShortVersionString: "0.2.2"
        CFBundleVersion: "0.2.2"
        NSHighResolutionCapable: true
        SUFeedURL: https://github.com/hongmono/Lathe/releases/latest/download/appcast.xml
        SUPublicEDKey: 2VzsRT4zVK1HpMKb6p0gOIVNSXHAadl54RQmv29Sxu8=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.hongmono.Lathe
        MACOSX_DEPLOYMENT_TARGET: "14.6"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: THG2GV26Z9
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
  LatheTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LatheTests
    dependencies:
      - target: Lathe
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lathe.app/Contents/MacOS/Lathe"

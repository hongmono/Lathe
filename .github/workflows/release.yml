name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Restrict to v + version chars to avoid shell-meta injection downstream.
          if ! [[ "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "Refusing unsafe tag: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Set up signing keychain
        env:
          CERT_P12_BASE64: ${{ secrets.SIGNING_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f /tmp/cert.p12

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release archive
        run: |
          xcodebuild -project Lathe.xcodeproj \
            -scheme Lathe \
            -configuration Release \
            -archivePath /tmp/Lathe.xcarchive \
            archive

      - name: Verify signature
        run: codesign -dvv /tmp/Lathe.xcarchive/Products/Applications/Lathe.app

      - name: Package
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          cp -R /tmp/Lathe.xcarchive/Products/Applications/Lathe.app dist/
          cd dist && zip -ry "Lathe-${TAG}.zip" Lathe.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/Lathe-${{ steps.tag.outputs.tag }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
